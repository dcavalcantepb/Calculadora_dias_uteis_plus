<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Dias Úteis</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="pagina">

<div class="container">

<h2>Calculadora de Dias Úteis do NPR</h2>


<label>Data início:</label>
<input type="date" id="dataInicio">


<label>Prazo (dias úteis):</label>
<input
type="number"
id="prazoDiasUteis"
min="1"
placeholder="Digite o prazo"
oninput="calcularDataFinal()"
>


<label>Data fim:</label>
<input type="date" id="dataFim">


<label class="opcao">

<input type="checkbox" id="contarInicio">

<span>Contar data inicial</span>

</label>


<div class="botoes">

<button class="btn-calcular"
onclick="calcularDiasUteisEntreDatas()">

Dias úteis entre datas

</button>


<button class="btn-limpar"
onclick="limparCampos()">

Limpar

</button>

</div>

<p id="resultado"></p>

</div>


<div class="footer">

Feito com ☕ <br>
Danilo Cavalcante - 2026

</div>

</div>

<script src="feriados.js"></script>
<script src="script.js"></script>

</body>
</html>
